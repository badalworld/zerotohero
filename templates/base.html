<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zero to Hero{% endblock %} - Trading Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .navbar {
            background-color: var(--card-bg) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--card-bg), #334155);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .badge-long {
            background-color: var(--success-color);
            color: white;
        }
        
        .badge-short {
            background-color: var(--danger-color);
            color: white;
        }
        
        .badge-testnet {
            background-color: var(--warning-color);
            color: black;
        }
        
        .badge-mainnet {
            background-color: var(--danger-color);
            color: white;
        }
        
        .table {
            color: var(--text-primary);
        }
        
        .table thead th {
            border-bottom-color: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .table td {
            border-bottom-color: rgba(255,255,255,0.05);
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-success {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }
        
        .btn-danger {
            background-color: var(--danger-color);
            border-color: var(--danger-color);
        }
        
        .log-entry {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        
        .log-info { background-color: rgba(99, 102, 241, 0.2); }
        .log-warning { background-color: rgba(245, 158, 11, 0.2); }
        .log-error { background-color: rgba(239, 68, 68, 0.2); }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        
        .status-active { background-color: var(--success-color); animation: pulse 2s infinite; }
        .status-inactive { background-color: var(--danger-color); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .profit { color: var(--success-color); }
        .loss { color: var(--danger-color); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-rocket-takeoff me-2"></i>
                <strong>Zero to Hero</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2 me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'trades' %}active{% endif %}" href="/trades">
                            <i class="bi bi-graph-up me-1"></i> Trades
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}" href="/settings">
                            <i class="bi bi-gear me-1"></i> Settings
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="mode-badge" class="badge me-3">Loading...</span>
                    <span id="status-indicator">
                        <span class="status-indicator status-inactive"></span>
                        <span id="status-text">Disconnected</span>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-3 text-secondary">
        <small>Zero to Hero v1.0.0 | Author: Md Moniruzzaman | EMA 9/21 Crossover Strategy</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
  </html>
